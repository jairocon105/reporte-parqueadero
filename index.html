<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reporte Parqueadero</title>
  <style>
    body { font-family: system-ui, Arial; margin: 16px; max-width: 520px; }
    h1 { font-size: 20px; margin: 0 0 12px; }
    label { display: block; margin: 12px 0 6px; font-weight: 600; }
    input, button { width: 100%; padding: 12px; font-size: 16px; }
    input { box-sizing: border-box; }
    button { margin-top: 10px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; }
    button.primary { background: #111; color: white; border: none; margin-top: 14px; }
    button:disabled { opacity: .65; cursor: not-allowed; }
    .hint { font-size: 13px; opacity: .75; margin-top: 6px; }
    .row { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 14px; }
    .status { margin-top: 12px; font-size: 14px; }
    .ok { color: #0a7a2f; }
    .err { color: #b00020; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
    }
    .modal {
      width: 100%;
      max-width: 520px;
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e6e6e6;
      box-shadow: 0 10px 30px rgba(0,0,0,.18);
      padding: 16px;
    }
    .modal h2 { margin: 0 0 10px; font-size: 18px; }
    .modal .msg { font-size: 15px; line-height: 1.35; white-space: pre-wrap; }
    .modal .actions { margin-top: 14px; }
  </style>
</head>
<body>
  <h1>Reporte: vehículo en parqueadero equivocado</h1>

  <div class="card">
    <div class="row" id="formRoot">

      <div>
        <label for="parq">Parqueadero afectado *</label>
        <input id="parq" placeholder="Ej: T4-140-4147 o P-214" required />
        <div class="hint">Escribe el número/código exactamente como está señalizado.</div>
      </div>

      <div>
        <label for="placa">Placa (opcional)</label>
        <input id="placa" placeholder="Ej: ABC123" />
        <div class="hint">Si la digitas, reduces errores del OCR.</div>
      </div>

      <div>
        <label>Foto del vehículo *</label>

        <button type="button" id="btnCamara">
          📷 Tomar foto (Cámara)
        </button>
        <input id="fotoCamara" type="file" accept="image/*" capture="environment" style="display:none" />

        <button type="button" id="btnGaleria">
          🖼️ Subir foto (Galería)
        </button>
        <input id="fotoGaleria" type="file" accept="image/*" style="display:none" />

        <div class="hint">
          Puedes tomar la foto en el momento o subir una imagen que ya tengas.
        </div>

        <div id="hintSize" class="hint"></div>
      </div>

      <button id="enviar" class="primary">Enviar reporte</button>
      <div id="status" class="status"></div>

    </div>
  </div>

  <!-- Modal resultado -->
  <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h2 id="modalTitle">Resultado</h2>
      <div id="modalMsg" class="msg"></div>
      <div class="actions">
        <button id="modalOk" class="primary" type="button">Ok</button>
      </div>
    </div>
  </div>

  <script>
    const N8N_WEBHOOK_URL = "https://betterlifeall.app.n8n.cloud/webhook/7c8fb655-d8a6-44f8-a640-a8054d80e12b";

    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const hintSizeEl = $("hintSize");
    const formRoot = $("formRoot");
    const btnEnviar = $("enviar");

    // Modal
    const modalBackdrop = $("modalBackdrop");
    const modalTitle = $("modalTitle");
    const modalMsg = $("modalMsg");
    const modalOk = $("modalOk");

    function setStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = "status " + (kind === "ok" ? "ok" : kind === "err" ? "err" : "");
    }

    function normalizePlate(s) {
      return (s || "")
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, "")
        .trim();
    }

    function setFormDisabled(disabled) {
      // deshabilita inputs y botones dentro del "formRoot"
      const controls = formRoot.querySelectorAll("input, button");
      controls.forEach(el => {
        // permitir que el modal funcione aparte
        el.disabled = disabled;
      });

      if (disabled) {
        btnEnviar.textContent = "Enviando...";
      } else {
        btnEnviar.textContent = "Enviar reporte";
      }
    }

    function openModal(title, message) {
      modalTitle.textContent = title;
      modalMsg.textContent = message;
      modalBackdrop.style.display = "flex";
      modalBackdrop.setAttribute("aria-hidden", "false");
      modalOk.focus();
    }

    function closeModal() {
      modalBackdrop.style.display = "none";
      modalBackdrop.setAttribute("aria-hidden", "true");
    }

    function resetForm() {
      $("parq").value = "";
      $("placa").value = "";
      $("fotoCamara").value = "";
      $("fotoGaleria").value = "";
      hintSizeEl.textContent = "";
      setStatus("", "");
    }

    $("btnCamara").addEventListener("click", () => $("fotoCamara").click());
    $("btnGaleria").addEventListener("click", () => $("fotoGaleria").click());

    function getSelectedFile() {
      return $("fotoGaleria").files?.[0] || $("fotoCamara").files?.[0] || null;
    }

    function fmtMB(bytes) {
      return (bytes / (1024 * 1024)).toFixed(2) + " MB";
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    async function renderJpegBlob(img, maxSide, quality) {
      let w = img.width;
      let h = img.height;
      const longer = Math.max(w, h);

      if (longer > maxSide) {
        const scale = maxSide / longer;
        w = Math.round(w * scale);
        h = Math.round(h * scale);
      }

      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext("2d");

      // fondo blanco (por transparencia)
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0, w, h);

      const blob = await new Promise((resolve) => {
        canvas.toBlob((b) => resolve(b), "image/jpeg", quality);
      });

      if (!blob) throw new Error("No se pudo procesar la imagen.");
      return { blob, w, h, quality, maxSide };
    }

    async function compressUnder2MB(file) {
      const LIMIT = 2 * 1024 * 1024; // 2MB
      const dataUrl = await readFileAsDataURL(file);

      const img = new Image();
      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
        img.src = dataUrl;
      });

      // Estrategia: bajar quality primero, luego maxSide
      const maxSides = [1280, 1120, 960, 840, 720];
      const qualities = [0.78, 0.72, 0.66, 0.60, 0.54, 0.48, 0.42];

      let lastTry = null;

      for (const maxSide of maxSides) {
        for (const q of qualities) {
          const attempt = await renderJpegBlob(img, maxSide, q);
          lastTry = attempt;
          if (attempt.blob.size <= LIMIT) {
            const outFile = new File([attempt.blob], "foto.jpg", { type: "image/jpeg" });
            return { outFile, meta: attempt, ok: true };
          }
        }
      }

      // no se logró
      const outFile = new File([lastTry.blob], "foto.jpg", { type: "image/jpeg" });
      return { outFile, meta: lastTry, ok: false };
    }

    async function previewSizeHint() {
      const file = getSelectedFile();
      if (!file) { hintSizeEl.textContent = ""; return; }
      hintSizeEl.textContent = `Tamaño original: ${fmtMB(file.size)}. Se comprimirá automáticamente a < 2MB antes de enviar.`;
    }

    $("fotoCamara").addEventListener("change", previewSizeHint);
    $("fotoGaleria").addEventListener("change", previewSizeHint);

    modalOk.addEventListener("click", () => {
      closeModal();
      resetForm();
      setFormDisabled(false);
      $("parq").focus();
    });

    // cerrar modal tocando fuera (opcional)
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) modalOk.click();
    });

    $("enviar").addEventListener("click", async () => {
      if (btnEnviar.disabled) return;

      setFormDisabled(true);

      try {
        const parqueadero = $("parq").value.trim();
        const placaDigitada = normalizePlate($("placa").value);
        const file = getSelectedFile();

        if (!parqueadero) {
          setFormDisabled(false);
          return openModal("Faltan datos", "Falta el parqueadero.");
        }
        if (!file) {
          setFormDisabled(false);
          return openModal("Faltan datos", "Debes tomar o subir una foto.");
        }

        setStatus("Procesando imagen (reduciendo a < 2MB)…", "");

        const { outFile, meta, ok } = await compressUnder2MB(file);

        hintSizeEl.textContent =
          `Original: ${fmtMB(file.size)} → Enviado: ${fmtMB(outFile.size)} ` +
          `(maxSide=${meta.maxSide}px, quality=${meta.quality}).`;

        if (!ok) {
          setFormDisabled(false);
          return openModal(
            "No se pudo enviar",
            "No se pudo bajar la imagen a menos de 2MB.\n" +
            "Intenta tomar la foto con menor resolución o desde más lejos."
          );
        }

        setStatus("Enviando…", "");

        const form = new FormData();
        form.append("parqueadero_reportado", parqueadero);
        form.append("placa_digitada", placaDigitada);
        form.append("foto", outFile, outFile.name);
        form.append("client_timestamp", new Date().toISOString());

        const res = await fetch(N8N_WEBHOOK_URL, { method: "POST", body: form });
        const text = await res.text();

        if (!res.ok) {
          setStatus("", "");
          return openModal("Error al enviar", `Error (${res.status}).\n${text}`);
        }

        setStatus("", "");
        return openModal("Enviado ✅", "Reporte enviado. Gracias.");

      } catch (e) {
        setStatus("", "");
        return openModal("Error", "Error: " + (e?.message || e));
      }
    });
  </script>
</body>
</html>
